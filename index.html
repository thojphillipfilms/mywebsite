<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phillip Thao</title>

    <!-- Your CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🎬 BACKGROUND CROSSFADE -->
<div class="bg-container">
    <div class="bg-image active" style="background-image: url('image/bridge1.jpg');"></div>
    <div class="bg-image" style="background-image: url('image/me.jpg');"></div>
    <div class="bg-image" style="background-image: url('image/work.jpg');"></div>
</div>

<!-- NAVBAR -->
<nav>
    <div class="logo">Phillip Thao</div>

    <div class="links">
        <a href="#home">Home</a>
        <a href="#AboutMe">About Me</a>
        <a href="#work">Work</a>
    </div>
</nav>

<!-- HERO SECTION -->
<section id="home" class="hero">
    <div class="overlay"></div>

    <div class="hero-content fade-section">
        <h1>THROUGH MY EYES</h1>
        <p>Film Maker • Colorist • Content Creator</p>
    </div>
</section>

<!-- ABOUT SECTION -->
<section id="AboutMe" class="section2">
    <div class="overlay"></div>

    <div class="content fade-section">
        <h2>About Me</h2>
        <p>Who am I?</p>
    </div>
</section>

<!-- WORK SECTION -->
<section id="work" class="section3">
    <div class="overlay"></div>

    <div class="content fade-section">
        <h2>My Work</h2>
    </div>
</section>

<!-- SCRIPTS -->
<script>
/* smooth scroll */
document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
        e.preventDefault();

        const target = document.querySelector(this.getAttribute('href'));

        if (target) {
            target.scrollIntoView({
                behavior: 'smooth'
            });
        }
    });
});

/* text fade-in */
document.addEventListener("DOMContentLoaded", () => {
    const faders = document.querySelectorAll('.fade-section');

    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.3 });

    faders.forEach(fader => observer.observe(fader));
});

/* 🎬 BACKGROUND CROSSFADE */
const sections = document.querySelectorAll("section");
const backgrounds = document.querySelectorAll(".bg-image");

const bgObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const index = Array.from(sections).indexOf(entry.target);

            backgrounds.forEach(bg => bg.classList.remove("active"));
            if (backgrounds[index]) {
                backgrounds[index].classList.add("active");
            }
        }
    });
}, { threshold: 0.5 });

sections.forEach(section => bgObserver.observe(section));
</script>

</body>
</html>
